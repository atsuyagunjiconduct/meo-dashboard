// ===== MEO SCORE ENGINE =====
function calcMeoScore(store,kpi,aio){
  const scores={};
  let basic=0;
  if(store.name)basic+=3;if(store.phone)basic+=3;if(store.website)basic+=4;
  if(store.category)basic+=3;if(store.address)basic+=3;if(store.status==='営業中')basic+=4;
  scores.basic={score:basic,max:20,pct:Math.round(basic/20*100),label:'基本情報'};
  let rev=0;
  if(store.rating>=4.0)rev+=8;else if(store.rating>=3.5)rev+=5;else rev+=2;
  if(store.reviewCount>=100)rev+=8;else if(store.reviewCount>=50)rev+=5;else if(store.reviewCount>=20)rev+=3;
  rev+=Math.min(9,Math.round(store.rating*2));
  scores.reviews={score:Math.min(25,rev),max:25,pct:Math.round(Math.min(25,rev)/25*100),label:'クチコミ'};
  let vis=0;
  const kpiArr=Array.isArray(kpi)?kpi:KPI;
  const viewGrowth=(kpiArr[0].value-kpiArr[0].prev)/kpiArr[0].prev;
  if(viewGrowth>0.15)vis+=10;else if(viewGrowth>0.05)vis+=7;else if(viewGrowth>0)vis+=4;
  if(kpiArr[0].value>10000)vis+=8;else if(kpiArr[0].value>5000)vis+=5;else vis+=2;
  const ctr=(kpiArr[1].value+kpiArr[2].value+kpiArr[3].value)/kpiArr[0].value;
  if(ctr>0.2)vis+=7;else if(ctr>0.1)vis+=5;else vis+=2;
  scores.visibility={score:Math.min(25,vis),max:25,pct:Math.round(Math.min(25,vis)/25*100),label:'検索露出'};
  let aioS=0;
  const avgRank=aio.reduce((s,a)=>(s+a.google+a.chatgpt+a.gemini+a.claude),0)/(aio.length*4);
  if(avgRank<=3)aioS+=15;else if(avgRank<=5)aioS+=12;else if(avgRank<=8)aioS+=8;else if(avgRank<=12)aioS+=4;else aioS+=1;
  scores.aio={score:aioS,max:15,pct:Math.round(aioS/15*100),label:'AI検索'};
  let eng=0;
  if(store.photoCount>=50)eng+=6;else if(store.photoCount>=20)eng+=4;else eng+=1;
  const routeRate=kpiArr[1].value/kpiArr[0].value;
  if(routeRate>0.1)eng+=5;else if(routeRate>0.05)eng+=3;else eng+=1;
  const callRate=kpiArr[2].value/kpiArr[0].value;
  if(callRate>0.02)eng+=4;else if(callRate>0.01)eng+=2;else eng+=1;
  scores.engagement={score:Math.min(15,eng),max:15,pct:Math.round(Math.min(15,eng)/15*100),label:'エンゲージメント'};
  const total=Object.values(scores).reduce((s,v)=>s+v.score,0);
  return{scores,total,maxTotal:100,pct:Math.round(total/100*100)};
}

function getMeoRank(pct){
  if(pct>=90)return{rank:'S',title:'MEOマスター',color:'#41B25D',bg:'#EDFCF0'};
  if(pct>=75)return{rank:'A',title:'MEO上級者',color:'#41B25D',bg:'#EDFCF0'};
  if(pct>=60)return{rank:'B',title:'MEO中級者',color:'#F59E0B',bg:'#FFFBEB'};
  if(pct>=40)return{rank:'C',title:'MEO初心者',color:'#F97316',bg:'#FFF7ED'};
  return{rank:'D',title:'対策が必要',color:'#EF4444',bg:'#FEF2F2'};
}

function AnimNum({value,duration=1200}){
  const[dv,setDv]=useState(0);
  useEffect(()=>{
    let start=Date.now();
    const t=setInterval(()=>{
      const p=Math.min((Date.now()-start)/duration,1);
      const e=1-Math.pow(1-p,3);
      setDv(Math.round(e*value));
      if(p>=1)clearInterval(t);
    },16);
    return()=>clearInterval(t);
  },[value]);
  return html`<span>${dv.toLocaleString()}</span>`;
}

  const pct=data.prev?((diff/data.prev)*100).toFixed(1):'0.0';

function LineChart({data,width=600,height=200}){
  const pad={t:20,r:20,b:35,l:50};
  const w=width-pad.l-pad.r, h=height-pad.t-pad.b;
  const maxV=Math.max(...data.map(d=>d.views))*1.1;
  const pts=data.map((d,i)=>({x:pad.l+(i/(data.length-1))*w,y:pad.t+h-(d.views/maxV)*h}));
  const line=pts.map((p,i)=>i===0?'M'+p.x+','+p.y:'L'+p.x+','+p.y).join(' ');
  const area=line+' L'+pts[pts.length-1].x+','+(pad.t+h)+' L'+pts[0].x+','+(pad.t+h)+' Z';
  const gridLines=[0,0.25,0.5,0.75,1].map(f=>{
    const y=pad.t+h-f*h;
    const val=Math.round(f*maxV);
    return html`<g key=${f}>
      <line x1=${pad.l} y1=${y} x2=${pad.l+w} y2=${y} stroke="#F3F4F6" strokeWidth="1"/>
      <text x=${pad.l-8} y=${y+4} textAnchor="end" fill="#9CA3AF" fontSize="10">${(val/1000).toFixed(1)}k</text>
    </g>`;
  });
  return html`<svg viewBox="0 0 ${width} ${height}" class="w-full" style=${{maxHeight:height+'px'}}>
    ${gridLines}
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#3B82F6" stopOpacity="0.15"/>
        <stop offset="100%" stopColor="#3B82F6" stopOpacity="0.01"/>
      </linearGradient>
    </defs>
    <path d=${area} fill="url(#areaGrad)"/>
    <path d=${line} fill="none" stroke="#3B82F6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
      style=${{strokeDasharray:2000,animation:'drawLine 1.5s ease-out forwards'}}/>
    ${pts.map((p,i)=>html`<circle key=${i} cx=${p.x} cy=${p.y} r="4" fill="#fff" stroke="#3B82F6" strokeWidth="2.5"/>`)}
    ${data.map((d,i)=>html`<text key=${i} x=${pts[i].x} y=${pad.t+h+20} textAnchor="middle" fill="#6B7280" fontSize="11" fontWeight="500">${d.month}</text>`)}
  </svg>`;
}

function ScoreRing({value,size=140,strokeWidth=10,color='#41B25D'}){
  const[dv,setDv]=useState(0);
  const r=(size-strokeWidth)/2,c=r*2*Math.PI,off=c-(dv/100)*c;
  useEffect(()=>{
    let start=Date.now();
    const t=setInterval(()=>{
      const p=Math.min((Date.now()-start)/1500,1);
      setDv(Math.round((1-Math.pow(1-p,3))*value));
      if(p>=1)clearInterval(t);
    },16);
    return()=>clearInterval(t);
  },[value]);
  return html`<div class="relative inline-flex items-center justify-center">
    <svg width=${size} height=${size} class="transform -rotate-90">
      <circle cx=${size/2} cy=${size/2} r=${r} stroke="#F3F4F6" strokeWidth=${strokeWidth} fill="none"/>
      <circle cx=${size/2} cy=${size/2} r=${r} stroke=${color} strokeWidth=${strokeWidth} fill="none"
        strokeDasharray=${c} strokeDashoffset=${off} strokeLinecap="round"
        style=${{transition:'stroke-dashoffset 1.5s ease-out'}}/>
    </svg>
    <div class="absolute flex flex-col items-center">
      <span class="text-3xl font-black" style=${{color}}>${dv}</span>
      <span class="text-xs text-gray-400">/ 100</span>
    </div>
  </div>`;
}

function App(){
  const [screen,setScreen]=useState('connect');
  const [storeData,setStoreData]=useState(null);
  const [isDemo,setIsDemo]=useState(false);
  const [isGbpAuth,setIsGbpAuth]=useState(false);
  const [authStatus,setAuthStatus]=useState(null);
  const [locations,setLocations]=useState([]);
  const [loading,setLoading]=useState(true);
  const [authError,setAuthError]=useState('');

  // Check auth status on mount
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch('/api/auth/status');
        const json=await res.json();
        setAuthStatus(json);

        // Check URL params for OAuth callback
        const params=new URLSearchParams(window.location.search);
        if(params.get('auth')==='success' && json.authenticated){
          // Successfully authenticated, fetch locations
          window.history.replaceState({},'','/');
          setIsGbpAuth(true);
          await fetchAndShowLocations();
        } else if(params.get('auth')==='error'){
          const reason=params.get('reason')||'';
          window.history.replaceState({},'','/');
          if(reason==='not_configured'){
            setAuthError('Googleビジネスプロフィール連携がまだ設定されていません。');
          } else {
            setAuthError('認証に失敗しました: '+reason);
          }
        } else if(json.authenticated){
          setIsGbpAuth(true);
          await fetchAndShowLocations();
        }
      }catch(e){
        console.error('Auth check failed:', e);
      }
      setLoading(false);
    })();
  },[]);

  const fetchAndShowLocations=async()=>{
    try{
      const res=await fetch('/api/gbp/locations');
      const json=await res.json();
      if(json.status==='OK' && json.locations?.length>0){
        setLocations(json.locations);
        if(json.locations.length===1){
          // Auto-select single location
          await fetchDashboard(json.locations[0]);
        } else {
          setScreen('selectLocation');
        }
      } else {
        setAuthError(json.message||'店舗が見つかりませんでした。');
        setScreen('connect');
      }
    }catch(e){
      setAuthError('店舗データの取得に失敗しました。');
      setScreen('connect');
    }
  };

  const fetchDashboard=async(loc)=>{
    try{
      const res=await fetch('/api/gbp/dashboard?account='+encodeURIComponent(loc.accountName)+'&location='+encodeURIComponent(loc.name));
      const json=await res.json();
      if(json.status==='OK' && json.data){
        setStoreData(json.data);
        setIsDemo(false);
        setScreen('dashboard');
      } else {
        setAuthError(json.message||'データの取得に失敗しました。');
      }
    }catch(e){
      setAuthError('通信エラーが発生しました。');
    }
  };

  const handleDemo=()=>{
    setIsDemo(true);
    setStoreData(null);
    setIsGbpAuth(false);
    setScreen('dashboard');
  };

  const handleGoHome=()=>{
    setScreen('connect');
    setStoreData(null);
    setIsDemo(false);
    setAuthError('');
  };

  const handleLogout=async()=>{
    try{ await fetch('/api/auth/logout'); }catch(e){}
    setIsGbpAuth(false);
    setLocations([]);
    setStoreData(null);
    setAuthStatus(prev=>({...prev, authenticated:false}));
    setScreen('connect');
  };

  const handleLocationSelect=(dashboardData)=>{
    setStoreData(dashboardData);
    setIsDemo(false);
    setScreen('dashboard');
  };

  if(loading){
    return html`<div class="min-h-screen flex items-center justify-center" style=${{background:'linear-gradient(135deg,#F0FDF4 0%,#F8FAFB 40%,#EFF6FF 100%)'}}>
      <div class="text-center">
        <div class="w-12 h-12 border-3 border-brand-500 border-t-transparent rounded-full mx-auto mb-4" style=${{animation:'spin 1s linear infinite'}}/>
        <p class="text-sm text-gray-500">読み込み中...</p>
      </div>
    </div>`;
  }

  if(screen==='connect'){
    return html`<div>
      ${authError && html`<div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700 shadow-lg flex items-center gap-2 max-w-md">
        <${Icon} name="alertTriangle" size=${16} color="#EF4444"/>
        <span>${authError}</span>
        <button onClick=${()=>setAuthError('')} class="ml-2 text-red-400 hover:text-red-600"><${Icon} name="x" size=${14}/></button>
      </div>`}
      <${ConnectScreen} onDemo=${handleDemo} authStatus=${authStatus}/>
    </div>`;
  }

  if(screen==='selectLocation'){
    return html`<${LocationSelectScreen} locations=${locations} onSelect=${handleLocationSelect} onLogout=${handleLogout} onGoHome=${handleGoHome}/>`;
  }

  return html`<${Dashboard} storeData=${storeData} isDemo=${isDemo} isGbpAuth=${isGbpAuth} onGoHome=${handleGoHome} onLogout=${handleLogout}/>`;
}

// ===== RENDER =====
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
