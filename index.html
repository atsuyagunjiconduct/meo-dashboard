// ===== MEO SCORE ENGINE =====
function calcMeoScore(store,kpi,aio){
  const scores={};
  // Basic info (20pts)
  let basic=0;
  if(store.name)basic+=3;if(store.phone)basic+=3;if(store.website)basic+=4;
  if(store.category)basic+=3;if(store.address)basic+=3;if(store.status==='営業中')basic+=4;
  scores.basic={score:basic,max:20,pct:Math.round(basic/20*100),label:'基本情報'};
  // Reviews (25pts)
  let rev=0;
  if(store.rating>=4.0)rev+=8;else if(store.rating>=3.5)rev+=5;else rev+=2;
  if(store.reviewCount>=100)rev+=8;else if(store.reviewCount>=50)rev+=5;else if(store.reviewCount>=20)rev+=3;
  rev+=Math.min(9,Math.round(store.rating*2));
  scores.reviews={score:Math.min(25,rev),max:25,pct:Math.round(Math.min(25,rev)/25*100),label:'クチコミ'};
  // Visibility (25pts)
  let vis=0;
  const viewGrowth=(kpi[0].value-kpi[0].prev)/kpi[0].prev;
  if(viewGrowth>0.15)vis+=10;else if(viewGrowth>0.05)vis+=7;else if(viewGrowth>0)vis+=4;
  if(kpi[0].value>10000)vis+=8;else if(kpi[0].value>5000)vis+=5;else vis+=2;
  const ctr=(kpi[1].value+kpi[2].value+kpi[3].value)/kpi[0].value;
  if(ctr>0.2)vis+=7;else if(ctr>0.1)vis+=5;else vis+=2;
  scores.visibility={score:Math.min(25,vis),max:25,pct:Math.round(Math.min(25,vis)/25*100),label:'検索露出'};
  // AIO (15pts)
  let aioS=0;
  const avgRank=aio.reduce((s,a)=>(s+a.google+a.chatgpt+a.gemini+a.claude+a.perplexity),0)/(aio.length*5);
  if(avgRank<=3)aioS+=15;else if(avgRank<=5)aioS+=12;else if(avgRank<=8)aioS+=8;else if(avgRank<=12)aioS+=4;else aioS+=1;
  scores.aio={score:aioS,max:15,pct:Math.round(aioS/15*100),label:'AI検索'};
  // Engagement (15pts)
  let eng=0;
  if(store.photoCount>=50)eng+=6;else if(store.photoCount>=20)eng+=4;else eng+=1;
  const routeRate=kpi[1].value/kpi[0].value;
  if(routeRate>0.1)eng+=5;else if(routeRate>0.05)eng+=3;else eng+=1;
  const callRate=kpi[2].value/kpi[0].value;
  if(callRate>0.02)eng+=4;else if(callRate>0.01)eng+=2;else eng+=1;
  scores.engagement={score:Math.min(15,eng),max:15,pct:Math.round(Math.min(15,eng)/15*100),label:'エンゲージメント'};

  const total=Object.values(scores).reduce((s,v)=>s+v.score,0);
  const maxTotal=100;
  return{scores,total,maxTotal,pct:Math.round(total/maxTotal*100)};
}

function getMeoRank(pct){
  if(pct>=90)return{rank:'S',title:'MEOマスター',color:'#41B25D',bg:'#EDFCF0'};
  if(pct>=75)return{rank:'A',title:'MEO上級者',color:'#41B25D',bg:'#EDFCF0'};
  if(pct>=60)return{rank:'B',title:'MEO中級者',color:'#F59E0B',bg:'#FFFBEB'};
  if(pct>=40)return{rank:'C',title:'MEO初心者',color:'#F97316',bg:'#FFF7ED'};
  return{rank:'D',title:'対策が必要',color:'#EF4444',bg:'#FEF2F2'};
}

// ===== COMPONENTS =====

// Animated Number
function AnimNum({value,duration=1200}){
  const[dv,setDv]=useState(0);
  useEffect(()=>{
    let start=Date.now();
    const t=setInterval(()=>{
      const p=Math.min((Date.now()-start)/duration,1);
      const e=1-Math.pow(1-p,3);
      setDv(Math.round(e*value));
      if(p>=1)clearInterval(t);
    },16);
    return()=>clearInterval(t);
  },[value]);
  return html`<span>${dv.toLocaleString()}</span>`;
}

// KPI Card
function KpiCard({data,delay=0}){
  const diff=data.value-data.prev;
  const pct=((diff/data.prev)*100).toFixed(1);
  const up=diff>=0;
  return html`<div class="card p-5 anim-fade" style=${{animationDelay:delay+'ms'}}>
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs font-medium text-gray-500 uppercase tracking-wide">${data.label}</span>
      <div class="w-9 h-9 rounded-lg green-gradient-subtle flex items-center justify-center">
        <${Icon} name=${data.icon} size=${18} color="#41B25D"/>
      </div>
    </div>
    <div class="text-3xl font-extrabold text-gray-900 mb-1"><${AnimNum} value=${data.value}/></div>
    <div class="flex items-center gap-1.5">
      <span class="inline-flex items-center gap-0.5 text-xs font-semibold px-2 py-0.5 rounded-full ${up?'badge-up':'badge-down'}">
        <${Icon} name=${up?'trendUp':'trendDown'} size=${12}/> ${up?'+':''}${pct}%
      </span>
      <span class="text-xs text-gray-400">${data.period}</span>
    </div>
  </div>`;
}

// Mini Line Chart (SVG)
function LineChart({data,width=600,height=200}){
  const pad={t:20,r:20,b:35,l:50};
  const w=width-pad.l-pad.r, h=height-pad.t-pad.b;
  const maxV=Math.max(...data.map(d=>d.views))*1.1;
  const pts=data.map((d,i)=>({x:pad.l+(i/(data.length-1))*w,y:pad.t+h-(d.views/maxV)*h}));
  const line=pts.map((p,i)=>i===0?'M'+p.x+','+p.y:'L'+p.x+','+p.y).join(' ');
  const area=line+' L'+pts[pts.length-1].x+','+(pad.t+h)+' L'+pts[0].x+','+(pad.t+h)+' Z';
  const gridLines=[0,0.25,0.5,0.75,1].map(f=>{
    const y=pad.t+h-f*h;
    const val=Math.round(f*maxV);
    return html`<g key=${f}>
      <line x1=${pad.l} y1=${y} x2=${pad.l+w} y2=${y} stroke="#F3F4F6" strokeWidth="1"/>
      <text x=${pad.l-8} y=${y+4} textAnchor="end" fill="#9CA3AF" fontSize="10">${(val/1000).toFixed(1)}k</text>

// Score Ring
function ScoreRing({value,size=140,strokeWidth=10,color='#41B25D'}){
  const[dv,setDv]=useState(0);
  const r=(size-strokeWidth)/2,c=r*2*Math.PI,off=c-(dv/100)*c;
  useEffect(()=>{
    let start=Date.now();
    const t=setInterval(()=>{
      const p=Math.min((Date.now()-start)/1500,1);
      setDv(Math.round((1-Math.pow(1-p,3))*value));
      if(p>=1)clearInterval(t);
    },16);
    return()=>clearInterval(t);
  },[value]);
  return html`<div class="relative inline-flex items-center justify-center">
    <svg width=${size} height=${size} class="transform -rotate-90">
      <circle cx=${size/2} cy=${size/2} r=${r} stroke="#F3F4F6" strokeWidth=${strokeWidth} fill="none"/>
      <circle cx=${size/2} cy=${size/2} r=${r} stroke=${color} strokeWidth=${strokeWidth} fill="none"
        strokeDasharray=${c} strokeDashoffset=${off} strokeLinecap="round"
        style=${{transition:'stroke-dashoffset 1.5s ease-out'}}/>
    </svg>
    <div class="absolute flex flex-col items-center">
      <span class="text-3xl font-black" style=${{color}}>${dv}</span>
      <span class="text-xs text-gray-400">/ 100</span>
    </div>
  </div>`;
}

              <p class="text-[11px] text-gray-400">Googleマップ集客診断</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="hidden sm:flex items-center gap-2 ${isReal?'bg-brand-50 text-brand-700':'bg-amber-50 text-amber-700'} text-xs font-medium px-3 py-1.5 rounded-full">
              <div class="w-2 h-2 rounded-full ${isReal?'bg-brand-500':'bg-amber-500'} animate-pulse"/>
              <span>${isReal?'ビジネスプロフィール連携中':'デモモード'}</span>
            </div>
            <button class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition-colors">
              <${Icon} name="settings" size=${16}/>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

      <!-- Store Info Bar -->
      <div class="card p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 anim-fade">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl green-gradient flex items-center justify-center text-white text-lg font-black">
            ${store.name.charAt(0)}
          </div>
          <div>
            <h2 class="text-lg font-bold text-gray-900">${store.name}</h2>
            <div class="flex items-center gap-3 text-xs text-gray-500">
              <span class="flex items-center gap-1"><${Icon} name="mapPin" size=${12}/> ${store.address}</span>
              <span class="flex items-center gap-1 text-brand-600 font-medium"><${Icon} name="circleDot" size=${12} color="#41B25D"/> ${store.status || '営業中'}</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-1">
            <${Stars} rating=${store.rating} size=${14}/>
            <span class="text-sm font-bold text-gray-700 ml-1">${store.rating}</span>
            <span class="text-xs text-gray-400">(${store.reviewCount}件)</span>
          </div>
          <div class="flex items-center gap-1 text-xs text-gray-500">
            <${Icon} name="camera" size=${13}/> ${store.photoCount || 0}枚
          </div>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        ${kpi.map((k,i)=>html`<${KpiCard} key=${k.id} data=${k} delay=${i*100}/>`)}
      </div>

      <!-- Charts Row -->
      <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
        <!-- Trend Chart -->
        <div class="lg:col-span-3 card p-5">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h3 class="text-base font-bold text-gray-900">表示回数トレンド</h3>
              <p class="text-xs text-gray-400">過去6ヶ月間の推移</p>
            </div>
            <div class="flex items-center gap-3 text-xs">
              <span class="flex items-center gap-1.5"><span class="w-3 h-0.5 rounded bg-brand-500"></span> 表示回数</span>
            </div>
          </div>
          <${LineChart} data=${viewsTrend}/>
        </div>

        <!-- Search Queries -->
        <div class="lg:col-span-2 card p-5">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h3 class="text-base font-bold text-gray-900">検索キーワード</h3>
              <p class="text-xs text-gray-400">表示につながったキーワード TOP8</p>
            </div>
            <${Icon} name="search" size=${16} color="#9CA3AF"/>
          </div>
          <${QueryBars} data=${searchQueries}/>
        </div>
      </div>

      <!-- AIO Rankings -->
      <div class="card p-5">
        <div class="flex items-center justify-between mb-1">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg green-gradient flex items-center justify-center">
              <${Icon} name="bot" size=${16} color="#fff"/>
            </div>
            <div>
              <h3 class="text-base font-bold text-gray-900">AI検索エンジン順位（AIO）</h3>
              <p class="text-xs text-gray-400">各AIからの検索結果における表示順位</p>
            </div>
          </div>
          <div class="flex items-center gap-2 text-[10px]">
            <span class="bg-brand-50 text-brand-700 px-2 py-0.5 rounded font-semibold">1-3位</span>
            <span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded font-semibold">4-5位</span>
            <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded font-semibold">6-10位</span>
            <span class="bg-red-50 text-red-600 px-2 py-0.5 rounded font-semibold">11位+</span>
          </div>
        </div>
        <div class="mt-4">
          <${AioTable} data=${aioRankings}/>
        </div>
      </div>

      <!-- MEO Score + Recommendations -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Score Panel -->
        <div class="card p-6 text-center">
          <div class="flex items-center justify-center gap-2 mb-4">
            <${Icon} name="award" size=${18} color="#41B25D"/>
            <h3 class="text-base font-bold text-gray-900">MEOスコア</h3>
          </div>
          <div class="mb-4">
            <${ScoreRing} value=${meo.pct} color=${rank.color}/>
          </div>
          <div class="inline-flex items-center gap-2 px-4 py-2 rounded-xl mb-4" style=${{background:rank.bg}}>
            <span class="rank-badge w-8 h-8 text-lg" style=${{background:rank.color==='#41B25D'?'linear-gradient(135deg,#41B25D,#56B877)':rank.color}}>${rank.rank}</span>
            <span class="text-sm font-bold" style=${{color:rank.color}}>${rank.title}</span>
          </div>
          <div class="mt-4">
            <${ScoreBars} scores=${meo.scores}/>
          </div>
        </div>

        <!-- Recommendations -->
        <div class="lg:col-span-2 space-y-3">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-8 h-8 rounded-lg green-gradient flex items-center justify-center">
              <${Icon} name="rocket" size=${16} color="#fff"/>
            </div>
            <div>
              <h3 class="text-base font-bold text-gray-900">改善アクション</h3>
              <p class="text-xs text-gray-400">スコアを上げるための具体的な施策</p>
            </div>
          </div>
          ${recs.map((r,i)=>html`<${RecCard} key=${i} ...${r} delay=${i*80}/>`)}
        </div>
      </div>

      <!-- Recent Reviews -->
      <div class="card p-5">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <${Icon} name="message" size=${18} color="#41B25D"/>
            <h3 class="text-base font-bold text-gray-900">最近のクチコミ</h3>
          </div>
          <span class="text-xs text-gray-400">${store.reviewCount}件のクチコミ</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          ${reviewsRecent.map((r,i)=>html`<div key=${i} class="p-4 bg-gray-50 rounded-xl anim-fade" style=${{animationDelay:i*80+'ms'}}>
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full green-gradient flex items-center justify-center text-white text-xs font-bold">${r.name.charAt(0)}</div>
                <div>
                  <span class="text-sm font-semibold text-gray-800">${r.name}</span>
                  <span class="text-xs text-gray-400 ml-2">${r.date}</span>
                </div>
              </div>
              <${Stars} rating=${r.rating} size=${12}/>
            </div>
            <p class="text-sm text-gray-600 leading-relaxed">${r.text}</p>
          </div>`)}
        </div>
      </div>
    </main>

    <!-- LINE CTA -->
    <${LineCTA}/>

    <!-- Footer -->
    <footer class="border-t border-gray-200 mt-8 py-6 text-center text-xs text-gray-400">
      MEO Dashboard — Googleマップ集客診断ツール
    </footer>
  </div>`;
}

// ===== APP ROUTER =====
function App(){
  const [screen,setScreen]=useState('connect'); // 'connect' | 'dashboard' | 'loading'
  const [storeData,setStoreData]=useState(null);
  const [isDemo,setIsDemo]=useState(false);
  const [loadingMsg,setLoadingMsg]=useState('');

  // On mount, check if user just returned from OAuth
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get('auth')==='success'){
      // OAuth succeeded — fetch real data
      window.history.replaceState({},'','/');
      setScreen('loading');
      setLoadingMsg('ビジネスプロフィールのデータを取得中...');
      fetchGBPData();
    } else if(params.get('auth')==='error'){
      alert('Google連携に失敗しました: '+(params.get('reason')||'不明なエラー'));
      window.history.replaceState({},'','/');
    } else {
      // Check if already authenticated
      fetch('/api/auth/status').then(r=>r.json()).then(d=>{
        if(d.authenticated){
          setScreen('loading');
          setLoadingMsg('データを読み込み中...');
          fetchGBPData();
        }
      }).catch(()=>{});
    }
  },[]);

  async function fetchGBPData(){
    try{
      const res=await fetch('/api/gbp/dashboard');
      const json=await res.json();
      if(json.status==='OK' && json.data){
        setStoreData(json.data);
        setIsDemo(false);
        setScreen('dashboard');
      } else {
        // Fall back to demo if data fetch failed
        console.warn('GBP data fetch issue:',json.message||json);
        setIsDemo(true);
        setStoreData(null);
        setScreen('dashboard');
      }
    }catch(e){
      console.error('GBP fetch error:',e);
      setIsDemo(true);
      setStoreData(null);
      setScreen('dashboard');
    }
  }

  const handleConnect=()=>{
    // Redirect to server-side OAuth endpoint
    window.location.href='/auth/google';
  };

  const handleDemo=()=>{
    setIsDemo(true);
    setStoreData(null);
    setScreen('dashboard');
  };

  if(screen==='loading'){
    return html`<div class="min-h-screen flex flex-col items-center justify-center gap-4" style=${{background:'linear-gradient(135deg,#F0FDF4 0%,#F8FAFB 40%,#EFF6FF 100%)'}}>
      <div class="w-16 h-16 rounded-2xl green-gradient shadow-lg flex items-center justify-center">
        <${Icon} name="mapPin" size=${32} color="#fff"/>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-5 h-5 border-2 border-brand-500 border-t-transparent rounded-full" style=${{animation:'spin 1s linear infinite'}}/>
        <span class="text-sm font-medium text-gray-600">${loadingMsg}</span>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;
  }

  if(screen==='connect'){
    return html`<${ConnectScreen} onConnect=${handleConnect} onDemo=${handleDemo}/>`;
  }
  return html`<${Dashboard} storeData=${storeData} isDemo=${isDemo}/>`;
}

// ===== RENDER =====
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
